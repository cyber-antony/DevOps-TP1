<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
</head>

<body>
  <h1>Task Manager</h1>


  <!-- Eingabefeld und Schaltfläche zum Hinzufügen neuer Aufgaben -->
  <input type="text" id="taskInput" placeholder="Neue Aufgabe eingeben">
  <button onclick="addTask()">Add</button>


  <!-- Hier wird die Aufgabenliste dynamisch eingefügt -->
  <ul id="taskList"></ul>


  <script>
    // Aufgaben vom Backend laden und im Browser anzeigen
    async function loadTasks() {
      const response = await fetch('/api/tasks');
      const tasks = await response.json();


      const list = document.getElementById('taskList');
      list.innerHTML = '';


      tasks.forEach(task => {
        const li = document.createElement('li');
        li.textContent = task.title + ' ';


        const btn = document.createElement('button');
        btn.textContent = 'Delete';
        btn.onclick = () => deleteTask(task.id);


        li.appendChild(btn);
        list.appendChild(li);
      });
    }


    // Neue Aufgabe an das Backend senden und danach die Liste neu laden
    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();


      if (!title) return;


      await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title })
      });


      input.value = '';
      loadTasks();
    }


    // Aufgabe löschen und danach die Liste neu laden
    async function deleteTask(taskId) {
      await fetch('/api/tasks/' + taskId, { method: 'DELETE' });
      loadTasks();
    }


    // Beim Öffnen der Seite die aktuellen Aufgaben laden
    loadTasks();
  </script>
</body>

</html>
