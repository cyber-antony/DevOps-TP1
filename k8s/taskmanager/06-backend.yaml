apiVersion: v1
kind: Service
metadata:
  name: taskmanager-backend
  namespace: taskmanager
spec:
  selector:
    app: taskmanager-backend
  ports:
    - name: http
      port: 6000
      targetPort: 6000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-backend
  namespace: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmanager-backend
  template:
    metadata:
      labels:
        app: taskmanager-backend
    spec:
      containers:
        - name: backend
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
          args:
            - pip install --no-cache-dir flask psycopg2-binary && python /app/app.py
          ports:
            - containerPort: 6000
              name: http
          env:
            - name: DB_HOST
              value: taskmanager-postgres
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: taskmanager-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: backend-code
              mountPath: /app/app.py
              subPath: app.py
          readinessProbe:
            httpGet:
              path: /api/tasks
              port: 6000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/tasks
              port: 6000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: backend-code
          configMap:
            name: taskmanager-backend-code
