apiVersion: v1
kind: Service
metadata:
  name: taskmanager-web
  namespace: taskmanager
spec:
  type: NodePort
  selector:
    app: taskmanager-web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-web
  namespace: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskmanager-web
  template:
    metadata:
      labels:
        app: taskmanager-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: web-assets
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: web-assets
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: web-assets
          configMap:
            name: taskmanager-web-assets
